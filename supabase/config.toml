# Per-function auth settings.
# The OAuth dance and Strava's webhook arrive from outside your app,
# so those three endpoints must accept requests without a Supabase JWT.
# Manual backfill stays protected.

[functions.strava-auth]
verify_jwt = false

[functions.strava-callback]
verify_jwt = false

[functions.strava-webhook]
verify_jwt = false

[functions.strava-backfill]
verify_jwt = true

# Called from the browser (fetch/preflight), so platform JWT verification is off
# to allow the CORS OPTIONS request. The handler still REQUIRES a valid Supabase
# user in-code (getUser) — an anon key with no user session is rejected.
[functions.strava-link]
verify_jwt = false

# Browser-called (CORS preflight); requires a valid user in-code.
[functions.create-checkout-session]
verify_jwt = false

# Stripe calls this server-to-server (no Supabase JWT); verified by Stripe signature.
[functions.stripe-webhook]
verify_jwt = false
